# --------------------------------------------------
# CONDITIONS OF USE
# --------------------------------------------------
# x402 tokens are issued subject to the following conditions:
#
# 1. FIXED SUPPLY
#    The total supply of x402 is permanently fixed at 8,000,000,000 units.
#    The issuer account's ability to create additional tokens has been
#    irrevocably removed by locking the issuer account (setting
#    AUTH_REVOCABLE and AUTH_IMMUTABLE flags appropriately and removing
#    the master key). No inflation, no minting.
#
# 2. NON-CUSTODIAL
#    The issuer does not hold user funds. All token transfers occur
#    peer-to-peer on the Stellar network without intermediary custody.
#
# 3. UTILITY ONLY
#    x402 is a utility token. It does not represent equity, debt,
#    a share of profits, or any investment contract. Holding X402
#    confers no governance rights unless explicitly granted by a
#    separate on-chain mechanism.
#
# 4. TRUSTLINE REQUIREMENT
#    To receive x402, a Stellar account must establish a trustline
#    to the issuer (GCQCPOO5E33CS76NJOAS4LIPAWJYIV4PKNOG53QGHGXWWFVJWW5MFSYX).
#    The issuer reserves no right to freeze or clawback tokens
#    (AUTH_REVOCABLE is disabled).
#
# 5. COMPLIANCE
#    Recipients and traders of x402 are solely responsible for ensuring
#    their use complies with applicable laws and regulations in their
#    jurisdiction. The issuer makes no representations regarding the
#    legal status of x402 in any jurisdiction.
#
# 6. NO WARRANTIES
#    x402 is provided "as is" without warranty of any kind. The issuer
#    shall not be liable for any loss arising from the use or inability
#    to use x402, including losses due to smart-contract bugs, network
#    outages, or third-party exchange failures.
#
# 7. IMMUTABLE SUPPLY PROOF
#    Prospective holders can verify the fixed supply by inspecting the
#    issuer account on the Stellar network. The issuing account master
#    key weight must be 0 (or the account locked) to confirm no further
#    issuance is possible. On-chain proof supersedes any off-chain claim.
